<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electricity Cost Calculator</title>

<style>
body{
    font-family: Arial;
    background:#6F8CD6;
    color:white;
}
.box{
    width:400px;
    margin:60px auto;
    background:#A1BBCC;
    padding:25px;
    border-radius:10px;
}
input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
}
button{
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}
.result{
    background:#4C7A52;
    padding:15px;
    margin-top:15px;
    border-radius:6px;
    display:none;
}
</style>
</head>
<body>

<div class="box">
<h2>⚡️ ការគណនាតម្លៃនៃអគ្គីសនី</h2>

គីឡូអគ្គីសនី (kWh)
<input type="number" id="old" placeholder="បញ្ចូលគីឡូ kWh">

តម្លៃ kWh (៛)
<input type="number" id="price" placeholder="បញ្ចូលតម្លៃ">

<button onclick="calculate()">គណនា</button>

<div class="result" id="result"></div>
</div>

<script>
function calculate(){
    let old = document.getElementById("old").value;
    let price = document.getElementById("price").value;

    if(old=="" || price==""){
        alert("Please enter all values");
        return;
    }

    let used = old;
    let total = used * price;

    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML =
        "អគ្គីសនីអ្នកប្រើប្រាស់: <b>" + used + " kWh</b><br>" +
        "តម្លៃសរុប: <b>" + total.toLocaleString() + " ៛</b>";
}
</script>

</body>
</html>
