<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<title>ប្រព័ន្ធវិភាគទិន្នន័យលេខទូរស័ព្ទ</title>

<style>
/* --- 1. GLOBAL STYLES & BIG BACKGROUND --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Kantumruy Pro', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #0f172a; 
    background-image: 
        linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
    background-size: 35px 35px;
    padding: 20px;
}

/* --- 2. DASHBOARD CONTAINER --- */
.dashboard-container {
    width: 100%;
    max-width: 880px;
    border-radius: 24px;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

@media (max-width: 768px) {
    .dashboard-container { grid-template-columns: 1fr; }
    .panel-right { border-top: 1px solid rgba(255, 255, 255, 0.05); }
}

/* --- 3. LEFT PANEL BACKGROUND (INPUTS) --- */
.panel-left {
    background: #1e293b; 
    padding: 45px 35px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 1px solid rgba(255, 255, 255, 0.05);
}

.brand-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #38bdf8;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 15px;
}

.live-dot {
    width: 8px;
    height: 8px;
    background: #38bdf8;
    border-radius: 50%;
    box-shadow: 0 0 10px #38bdf8;
    animation: blink 1.2s infinite ease-in-out;
}
@keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.title {
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 35px;
    line-height: 1.6;
}

input {
    width: 100%;
    padding: 16px 20px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    font-size: 20px;
    color: #ffffff;
    text-align: center;
    letter-spacing: 1px;
    transition: all 0.25s ease;
    margin-bottom: 20px;
}

input:focus {
    outline: none;
    border-color: #38bdf8;
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
}

.btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
    border: none;
    border-radius: 12px;
    color: #0f172a;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
}

.btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 25px rgba(56, 189, 248, 0.35);
}

/* --- 4. RIGHT PANEL BACKGROUND --- */
.panel-right {
    background: #090d16; 
    padding: 45px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
}

.scan-line {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, transparent, #38bdf8, transparent);
    box-shadow: 0 0 15px #38bdf8;
    animation: scanMove 1.5s ease-in-out infinite;
    z-index: 5;
}
@keyframes scanMove {
    0% { top: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
}

.placeholder-view {
    color: #475569;
    font-size: 15px;
    text-align: center;
}

.display-view {
    display: none;
    width: 100%;
    text-align: center;
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.circle-box {
    position: relative;
    width: 150px;
    height: 150px;
    margin: 0 auto 20px auto;
    border-radius: 50%;
    transition: box-shadow 0.5s ease;
}

.circle-box svg { transform: rotate(-90deg); }
.circle-bg { fill: none; stroke: #1e293b; stroke-width: 6; }
.circle-progress {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.circle-box .num-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    font-weight: 800;
    color: #ffffff;
}

.score-tag {
    display: inline-block;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 20px;
    margin-bottom: 25px;
}
.tag-excellent { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
.tag-good { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
.tag-fair { background: rgba(203, 213, 225, 0.15); color: #cbd5e1; border: 1px solid rgba(203, 213, 225, 0.3); }
.tag-poor { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

/* --- ៥. MULTI-DATA GRID --- */
.metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
}

.metric-card {
    background: #1e293b;
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    padding: 12px;
    text-align: left;
}

.metric-label {
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    margin-bottom: 4px;
}

.metric-value {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
}

.energy-bar-container {
    width: 100%;
    height: 4px;
    background: #0f172a;
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
}
.energy-bar {
    width: 0%;
    height: 100%;
    background: #38bdf8;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.data-summary {
    background: #0f172a;
    border-top: 2px solid #334155;
    padding: 18px;
    border-radius: 12px;
    font-size: 14px;
    color: #94a3b8;
    line-height: 1.6;
    text-align: left;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    margin-bottom: 25px;
}

/* --- ៦. ACTION BUTTONS --- */
.action-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
}

.btn-secondary {
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    
    /* 🔴 កែប្រែបន្ថែម៖ ការពារកុំឱ្យមានបន្ទាត់ពីក្រោមអក្សរពេលប្តូរជា tag <a> */
    text-decoration: none; 
}

.btn-secondary:hover {
    background: #334155;
    color: #ffffff;
    border-color: #475569;
}
</style>
</head>

<div class="dashboard-container">

function runAnalysis() {
    const phoneInput = document.getElementById("phone");
    const phone = phoneInput.value.replace(/\D/g, '');

    if (phone.length < 9 || phone.length > 10) {
        alert("សូមបញ្ចូលលេខទូរស័ព្ទឱ្យបានត្រឹមត្រូវ ៩ ឬ ១០ ខ្ទង់!");
        return;
    }

    const last6 = phone.slice(-6);
    let result = Math.round(((Number(last6) / 80) % 1) * 80);
    if (result === 0) { result = 80; }

    const data = divinationData[result] || divinationData[1];
    
    const scanLine = document.getElementById("scanLine");
    const placeholderView = document.getElementById("placeholderView");
    const displayView = document.getElementById("displayView");

    scanLine.style.display = "block";
    placeholderView.style.display = "none";
    displayView.style.display = "none";

    setTimeout(() => {
        scanLine.style.display = "none";
        displayView.style.display = "block";

        document.getElementById("finalNum").textContent = result;
        document.getElementById("summaryText").textContent = data.detail;
        document.getElementById("fortuneStars").textContent = data.stars;
        document.getElementById("energyValue").textContent = data.score + "%";

        const scoreTag = document.getElementById("scoreTag");
        scoreTag.textContent = `កម្រិតជោគជតា៖ ${data.type}`;
        scoreTag.className = "score-tag";
        
        if(data.type === "ល្អណាស់") scoreTag.classList.add("tag-excellent");
        else if(data.type === "ល្អ") scoreTag.classList.add("tag-good");
        else if(data.type === "ធម្មតា") scoreTag.classList.add("tag-fair");
        else scoreTag.classList.add("tag-poor");

        const ring = document.getElementById("progressRing");
        const radius = 65;
        const circumference = 2 * Math.PI * radius;
        const offset = circumference - (data.score / 100) * circumference;
        
        ring.style.stroke = data.color;
        ring.style.strokeDashoffset = offset;

        document.getElementById("circleGlow").style.boxShadow = data.glow;

        const energyBar = document.getElementById("energyBar");
        energyBar.style.width = "0%";
        setTimeout(() => {
            energyBar.style.backgroundColor = data.color;
            energyBar.style.width = data.score + "%";
        }, 50);

    }, 1200);
}
</script>
