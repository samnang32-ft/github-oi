<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;700&display=swap" rel="stylesheet">

<title>Phone number divination rules</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kantumruy Pro',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    padding:20px;
}

.card{
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    color:white;
    text-align:center;
}

.title{
    font-size:30px;
    font-weight:bold;
    margin-bottom:15px;
}

.subtitle{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:18px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.result{
    display:none;
    margin-top:30px;
    background:rgba(15,23,42,.6);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:22px;
    animation:fadeIn .5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.number{
    font-size:50px;
    font-weight:bold;
    color:gold;
}

.detail{
    margin-top:15px;
    font-size:18px;
    line-height:1.8;
}

</style>
</head>

<body>

<div class="card">

    <div class="title">🔮 ក្បួនទស្សន៍ទាយលេខទូរស័ព្ទ</div>

    <div class="subtitle">
        បញ្ចូលលេខទូរស័ព្ទរបស់អ្នក
    </div>

    <input
        type="tel"
        id="phone"
        placeholder="ឧទាហរណ៍៖ 093927592"
        maxlength="10"
        pattern="[0-9]*"
        inputmode="numeric">

    <button onclick="predictPhone()">
        ទស្សន៍ទាយឥឡូវនេះ
    </button>

    <div class="result" id="resultBox">

        <div class="number" id="finalNumber"></div>

        <div class="detail" id="description"></div>

    </div>

</div>

        78: { type: "ធម្មតា", detail: "អនាគតមិនសូវភ្លឺស្លាងទេហើយក៏មិនសូវមានប្រពួសម្បត្តិដែរ" },

        80: { type: "ល្អណាស់", detail: "អាចទទួលបានជោគជ័យច្រើន" },

};

function predictPhone(){

    const phone = document
        .getElementById("phone")
        .value
        .replace(/\D/g,'');

    if(phone.length < 9 || phone.length > 10){
        alert("សូមបញ្ចូលលេខទូរស័ព្ទឱ្យបាន 9 ឬ 10 ខ្ទង់");
        return;
    }

    const last6 = phone.slice(-6);

    let result = Math.ceil(
        ((Number(last6) / 80) % 1) * 80
    );

    if(result === 0){
        result = 80;
    }

    const data = results[result];

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("finalNumber").textContent = result;

    if(typeof data === "string"){
        document.getElementById("description").textContent = data;
    }
    else if(data){
        document.getElementById("description").textContent =
            data.type + " = " + data.detail;
    }
    else{
        document.getElementById("description").textContent =
            "មិនទាន់មានទិន្នន័យ";
    }
}

</script>
